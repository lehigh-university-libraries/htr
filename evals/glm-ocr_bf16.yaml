        If you have any news from America it will be very acceptably. I have received no journals of compass of later date than Oct. 10. nor letter from the office for foreign affairs of later date than January. There is a violent contest anson here between the king I parliament of Bourdeaux. Then the papers are public I will send them to you. Adieu my dear Sir.

